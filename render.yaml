# Render Blueprint — POS API (FastAPI) + managed PostgreSQL
#
# Public URLs:
#   https://api.doposai.com — API + Web POS (same FastAPI process today)
#   https://doposai.com     — add as second Custom Domain on this service (or separate static site later)
#
# After deploy: Render dashboard → Custom Domains → add api + root domain → DNS CNAMEs as shown.

databases:
  - name: doposai-postgres
    databaseName: doposai
    user: doposai
    plan: basic-256mb

services:
  - type: web
    name: doposai-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh scripts/render_start.sh
    healthCheckPath: /health
    # Allow migrations + import before first successful /health (free tier is slow).
    healthCheckGracePeriod: 300
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production
      - key: WEB_PUBLIC_URL
        value: https://doposai.com
      # Platform-wide brand shown on the login screen, in password-reset
      # emails, and on Paynow billing line items.
      - key: PLATFORM_BRAND_NAME
        value: All In One POS
      - key: API_PUBLIC_URL
        value: https://api.doposai.com
      - key: CORS_ALLOW_ORIGINS
        value: https://doposai.com,https://www.doposai.com,https://api.doposai.com
      - key: DATABASE_URL
        fromDatabase:
          name: doposai-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      # Platform-owner allowlist for /platform/tenants (all SaaS businesses).
      #
      # PREFERRED: comma-separated EMAIL addresses. Emails are globally
      # unique across tenants. Example:
      #   PLATFORM_OWNER_EMAILS=you@example.com,cofounder@example.com
      - key: PLATFORM_OWNER_EMAILS
        sync: false
      # LEGACY/optional: comma-separated USERNAMES. AVOID setting this to
      # ``admin`` — every tenant signs up with that username, so the banner
      # would leak to every customer. Only use for ops accounts whose
      # usernames are globally unique on your deployment.
      - key: PLATFORM_OWNER_USERNAMES
        sync: false
      - key: PAYNOW_INTEGRATION_ID
        sync: false
      - key: PAYNOW_INTEGRATION_KEY
        sync: false
      - key: PAYNOW_RETURN_URL
        value: https://api.doposai.com/billing?payment=return
      - key: TRIAL_DAYS
        value: "14"
      - key: OFFLINE_GRACE_HOURS
        value: "72"
      # Gunicorn worker timeout (CSV import upload + large sync).
      - key: GUNICORN_TIMEOUT
        value: "180"
      # Single worker avoids free-tier 502s when import + product list compete.
      - key: WEB_CONCURRENCY
        value: "1"

      # SMTP — required for password-reset emails (/auth/forgot-password).
      # Without these the reset endpoint still issues a valid token but only
      # logs the URL server-side; the user gets a generic "check your inbox"
      # response with no actual email.
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false

      # WhatsApp Cloud API (single platform-owned number; per-tenant routing
      # happens by keyword inside the welcome menu — no per-tenant numbers).
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_APP_SECRET
        sync: false
      - key: WHATSAPP_API_VERSION
        value: "v21.0"
      - key: WHATSAPP_SESSION_TIMEOUT_HOURS
        value: "24"
      - key: WHATSAPP_BRAND_NAME
        value: "Photron Business Hub"
