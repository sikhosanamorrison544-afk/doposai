# Render Blueprint — POS API (FastAPI) + managed PostgreSQL
#
# Public URLs:
#   https://api.doposai.com — API + Web POS (same FastAPI process today)
#   https://doposai.com     — add as second Custom Domain on this service (or separate static site later)
#
# After deploy: Render dashboard → Custom Domains → add api + root domain → DNS CNAMEs as shown.

databases:
  - name: doposai-postgres
    databaseName: doposai
    user: doposai
    plan: basic-256mb

services:
  - type: web
    name: doposai-api
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh scripts/render_start.sh
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: APP_ENV
        value: production
      - key: WEB_PUBLIC_URL
        value: https://doposai.com
      - key: API_PUBLIC_URL
        value: https://api.doposai.com
      - key: CORS_ALLOW_ORIGINS
        value: https://doposai.com,https://www.doposai.com,https://api.doposai.com
      - key: DATABASE_URL
        fromDatabase:
          name: doposai-postgres
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      # Comma-separated admin usernames allowed to open /platform/tenants (all SaaS businesses).
      # Example: PLATFORM_OWNER_USERNAMES=morrison,admin
      - key: PLATFORM_OWNER_USERNAMES
        sync: false
