# Render Blueprint: GitHub repo → Render → New → Blueprint → select this file.
# Public web + API URL: https://doposai.com/ — add doposai.com under the service
# Settings → Custom Domains, then DNS CNAME as Render instructs.
#
# JWT_SECRET_KEY is generated here; rotate in the dashboard if needed.
# For production data, add Render PostgreSQL and set DATABASE_URL to its Internal URL.

services:
  - type: web
    name: pos-backend
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      # Ephemeral SQLite (data resets on restart). Replace with DATABASE_URL from a Render Postgres.
      - key: DATABASE_URL
        value: sqlite:////tmp/pos.db
      - key: JWT_SECRET_KEY
        generateValue: true
