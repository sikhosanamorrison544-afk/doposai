# DoposAI AI stack — Ubuntu 24.04 / Contabo VPS
# Usage: copy .env.example to .env, then: docker compose up -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - ai_net

  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen3-8B}
      --host 0.0.0.0
      --port 8000
      --max-model-len 8192
      --dtype auto
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    ports:
      - "8000:8000"
    networks:
      - ai_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  ai-api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      VLLM_BASE_URL: http://vllm:8000/v1
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      - redis
      - vllm
    networks:
      - ai_net

volumes:
  redis_data:
  huggingface_cache:

networks:
  ai_net:
    driver: bridge
