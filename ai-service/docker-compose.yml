# DoposAI AI stack — Ubuntu 24.04 / Contabo VPS
# Usage: copy .env.example to .env, then: docker compose up -d

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - ai_net

  vllm:
    image: vllm/vllm-openai:latest
    restart: unless-stopped
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: >
      --model ${VLLM_MODEL:-Qwen/Qwen3-8B-AWQ}
      --served-model-name ${VLLM_SERVED_NAME:-qwen3-8b}
      --host 0.0.0.0
      --port 8000
      --max-model-len ${VLLM_MAX_MODEL_LEN:-8192}
      --gpu-memory-utilization ${VLLM_GPU_UTIL:-0.90}
      --dtype auto
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    # Do not publish 8000 publicly — only ai-api on 8080 should face the internet.
    expose:
      - "8000"
    networks:
      - ai_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 300s

  ai-api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      VLLM_BASE_URL: http://vllm:8000/v1
      VLLM_MODEL: ${VLLM_SERVED_NAME:-qwen3-8b}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_started
      vllm:
        condition: service_healthy
    networks:
      - ai_net

volumes:
  redis_data:
  huggingface_cache:

networks:
  ai_net:
    driver: bridge
