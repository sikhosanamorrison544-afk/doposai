# ARM64 host (e.g. Pi): AGP requires path ending in `aapt2` — see .aapt2-box64/README.txt
android.aapt2FromMavenOverride=/home/morrison/Desktop/pos/android-app/.aapt2-box64/aapt2

android.useAndroidX=true
android.nonTransitiveRClass=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# Slow or flaky networks (e.g. Pi): avoid default short read timeouts on dependency downloads
systemProp.org.gradle.internal.http.connectionTimeout=120000
systemProp.org.gradle.internal.http.socketTimeout=120000
