<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment History - {{ store_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // CRITICAL: Apply theme INSTANTLY - must be first script, runs synchronously
        (function() {
            'use strict';
            try {
                const savedTheme = localStorage.getItem('pos-theme') || 'default';
                const validTheme = ['default', 'light', 'classic'].includes(savedTheme) ? savedTheme : 'default';
                if (validTheme !== savedTheme) {
                    try { localStorage.setItem('pos-theme', validTheme); } catch (e) {}
                }
                const themeClass = validTheme !== 'default' ? 'theme-' + validTheme : '';
                const themeBackgrounds = { 'default': 'linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%)', 'light': 'transparent', 'classic': '#e8e8e8' };
                
                if (themeClass) {
                    document.documentElement.className = (document.documentElement.className + ' ' + themeClass).trim();
                }
                
                function applyBodyTheme() {
                    if (document.body) {
                        document.body.classList.remove('theme-default', 'theme-light', 'theme-classic');
                        if (themeClass) {
                            document.body.classList.add(themeClass);
                        }
                    }
                }
                
                if (document.body) {
                    applyBodyTheme();
                } else {
                    if (document.readyState === 'loading') {
                        document.addEventListener('DOMContentLoaded', applyBodyTheme);
                    } else {
                        setTimeout(applyBodyTheme, 0);
                    }
                }
                
                const bg = themeBackgrounds[validTheme] || themeBackgrounds['default'];
                const style = document.createElement('style');
                style.id = 'theme-instant';
                style.setAttribute('data-theme', validTheme);
                if (bg !== 'transparent') {
                    if (validTheme === 'default') {
                        // Use pseudo-element with lower opacity to see 3D model through it
                        // Canvas is at z-index: -1, overlay is at z-index: -2, so canvas shows through
                        // Reduced opacity to 0.5 so 3D model is more visible
                        style.textContent = 'html,body{background:transparent!important;background-size:400% 400%!important;min-height:100vh!important;margin:0!important;padding:0!important;position:relative!important;}html::before,body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:' + bg + ';background-size:400% 400%;opacity:0.5;z-index:-2;pointer-events:none;}';
                    } else {
                        style.textContent = 'html,body{background:' + bg + '!important;min-height:100vh!important;margin:0!important;padding:0!important;}';
                    }
                } else {
                    style.textContent = 'html,body{background:transparent!important;min-height:100vh!important;margin:0!important;padding:0!important;}';
                }
                if (document.head.firstChild) {
                    document.head.insertBefore(style, document.head.firstChild);
                } else {
                    document.head.appendChild(style);
                }
            } catch (e) {}
        })();
    </script>
    <!-- Preload 3D model for faster loading -->
    <link rel="preload" href="/static/butterflies.glb" as="fetch" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
    
    </script>
    <style>
        /* Responsive font sizes that scale with zoom */
        html {
            font-size: 16px; /* Base font size */
        }
        
        /* Payment history table cells - use em units for responsive scaling */
        #payment-history-table tbody td {
            font-size: 1.1875em !important; /* 19px at base, scales with zoom */
            padding: 1.875em 1.5em !important; /* 30px 24px at base */
            line-height: 1.6 !important;
            word-wrap: break-word;
            overflow-wrap: break-word;
            max-width: 0; /* Allows text wrapping */
        }
        
        #payment-history-table tbody td:nth-child(2) {
            font-size: 1.25em !important; /* 20px at base for amounts */
        }
        
        /* Ensure text wraps instead of overflowing */
        #payment-history-table {
            table-layout: auto;
            word-wrap: break-word;
        }
        
        #payment-history-table td,
        #payment-history-table th {
            word-wrap: break-word;
            overflow-wrap: break-word;
            hyphens: auto;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<!-- 3D Background Canvas for Default Theme -->
<canvas id="bg3d-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; display: none; background: transparent;"></canvas>
<!-- Video Background for Light Theme -->
<video id="light-theme-video" autoplay loop muted playsinline preload="auto" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; display: none;">
    <source src="/static/background-web.mp4" type="video/mp4">
</video>
<script src="/static/js/light-theme-video.js?v=2"></script>
<div id="app" class="screen active" style="height: 100vh; overflow: hidden;">
    <header class="top-bar">
        <div class="shop-name">{{ store_name }}</div>
        <div class="top-bar-right">
            <button id="btn-download-history-pdf" class="small primary">Download PDF</button>
            <button id="btn-back-layby" class="small">Back to Layby</button>
            <button id="btn-logout" class="danger small">Logout</button>
        </div>
    </header>
    <main style="height: calc(100vh - 60px); overflow-y: auto; padding: 20px;">
        <div style="max-width: 1400px; margin: 0 auto;">
            <h1 style="margin-top: 0; margin-bottom: 24px; text-align: center;">Payment History</h1>
            
            <!-- Transaction Information Summary -->
            <div id="transaction-info" style="margin-bottom: 24px; padding: 24px; background: rgba(59, 130, 246, 0.15); border-radius: 12px; border: 2px solid rgba(59, 130, 246, 0.3);">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; font-size: 1rem;">
                    <div><strong style="color: #1a1a1a;">Transaction ID:</strong> <span id="transaction-id" style="font-size: 1.25em; font-weight: bold; color: #1a1a1a;">{{ transaction_id }}</span></div>
                    <div><strong style="color: #1a1a1a;">Customer:</strong> <span id="customer-name" style="font-size: 1.25em; font-weight: bold; color: #1a1a1a;">-</span></div>
                    <div><strong style="color: #1a1a1a;">Product:</strong> <span id="product-name" style="font-size: 1.25em; font-weight: bold; color: #1a1a1a;">-</span></div>
                    <div><strong style="color: #1a1a1a;">Total Amount:</strong> <span id="total-amount" style="font-size: 1.25em; font-weight: bold; color: #3b82f6;">$0.00</span></div>
                    <div><strong style="color: #1a1a1a;">Paid Amount:</strong> <span id="paid-amount" style="font-size: 1.25em; font-weight: bold; color: #10b981;">$0.00</span></div>
                    <div style="grid-column: 1 / -1; padding-top: 16px; border-top: 2px solid rgba(255,255,255,0.2);">
                        <strong style="color: #1a1a1a; font-size: 1.25em;">Balance:</strong> 
                        <span id="balance" style="color: #fbbf24; font-weight: bold; font-size: 1.75em; margin-left: 16px;">$0.00</span>
                    </div>
                </div>
            </div>
            
            <!-- Payment History Table -->
            <div style="background: rgba(17, 24, 39, 0.4); border-radius: 12px; padding: 24px; backdrop-filter: blur(20px);">
                <h2 style="margin-top: 0; margin-bottom: 20px; font-size: 24px; border-bottom: 2px solid rgba(255,255,255,0.2); padding-bottom: 12px;">
                    Payment History
                </h2>
                <div style="overflow-x: auto;">
                    <table id="payment-history-table" style="width: 100%; border-collapse: separate; border-spacing: 0; min-width: 800px;">
                        <thead>
                            <tr style="background: rgba(255,255,255,0.1);">
                                <th style="padding: 1.75em 1.5em; text-align: left; border-bottom: 3px solid rgba(255,255,255,0.25); font-weight: bold; font-size: 1.3125em; color: #1a1a1a; line-height: 1.8; letter-spacing: 0.03em; white-space: nowrap;">Date & Time</th>
                                <th style="padding: 1.75em 1.5em; text-align: right; border-bottom: 3px solid rgba(255,255,255,0.25); font-weight: bold; font-size: 1.3125em; color: #1a1a1a; line-height: 1.8; letter-spacing: 0.03em; white-space: nowrap;">Amount</th>
                                <th style="padding: 1.75em 1.5em; text-align: left; border-bottom: 3px solid rgba(255,255,255,0.25); font-weight: bold; font-size: 1.3125em; color: #1a1a1a; line-height: 1.8; letter-spacing: 0.03em; white-space: nowrap;">Payment Method</th>
                                <th style="padding: 1.75em 1.5em; text-align: left; border-bottom: 3px solid rgba(255,255,255,0.25); font-weight: bold; font-size: 1.3125em; color: #1a1a1a; line-height: 1.8; letter-spacing: 0.03em; white-space: nowrap;">Receipt Number</th>
                                <th style="padding: 1.75em 1.5em; text-align: left; border-bottom: 3px solid rgba(255,255,255,0.25); font-weight: bold; font-size: 1.3125em; color: #1a1a1a; line-height: 1.8; letter-spacing: 0.03em; white-space: nowrap;">Cashier</th>
                            </tr>
                        </thead>
                        <tbody id="payment-history-body">
                            <tr>
                                <td colspan="5" style="text-align: center; padding: 40px; color: #1a1a1a; font-size: 1.125em;">
                                    Loading payment history...
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script src="/static/js/price-input-formatter.js?v=7"></script>
<script src="/static/js/transaction_payment_history.js"></script>
<!-- Three.js for 3D Background -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="/static/js/background3d.js?v=5"></script>
</body>
</html>
