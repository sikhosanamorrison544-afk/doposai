<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Layby Management - {{ store_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script>
        // CRITICAL: Apply theme INSTANTLY - must be first script, runs synchronously
        (function() {
            'use strict';
            try {
                const savedTheme = localStorage.getItem('pos-theme') || 'default';
                const validTheme = ['default', 'light', 'classic'].includes(savedTheme) ? savedTheme : 'default';
                if (validTheme !== savedTheme) { try { localStorage.setItem('pos-theme', validTheme); } catch (e) {} }
                const themeClass = validTheme !== 'default' ? 'theme-' + validTheme : '';
                const themeBackgrounds = { 'default': 'linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #4facfe 75%, #00f2fe 100%)', 'light': 'transparent', 'classic': '#e8e8e8' };
                
                if (themeClass) document.documentElement.className = (document.documentElement.className + ' ' + themeClass).trim();
                function applyBodyTheme() {
                    if (document.body) {
                        document.body.classList.remove('theme-default', 'theme-light', 'theme-classic');
                        if (themeClass) document.body.classList.add(themeClass);
                    }
                }
                if (document.body) applyBodyTheme(); else if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', applyBodyTheme); else setTimeout(applyBodyTheme, 0);
                
                const bg = themeBackgrounds[validTheme] || themeBackgrounds['default'];
                const style = document.createElement('style');
                style.id = 'theme-instant';
                style.setAttribute('data-theme', validTheme);
                if (bg !== 'transparent') {
                    if (validTheme === 'default') {
                        // Use pseudo-element with lower opacity to see 3D model through it
                        // Canvas is at z-index: -1, overlay is at z-index: -2, so canvas shows through
                        // Reduced opacity to 0.5 so 3D model is more visible
                        style.textContent = 'html,body{background:transparent!important;background-size:400% 400%!important;min-height:100vh!important;margin:0!important;padding:0!important;position:relative!important;}html::before,body::before{content:"";position:fixed;top:0;left:0;width:100%;height:100%;background:' + bg + ';background-size:400% 400%;opacity:0.5;z-index:-2;pointer-events:none;}';
                    } else {
                        style.textContent = 'html,body{background:' + bg + '!important;min-height:100vh!important;margin:0!important;padding:0!important;}';
                    }
                } else {
                    style.textContent = 'html,body{background:transparent!important;min-height:100vh!important;margin:0!important;padding:0!important;}';
                }
                if (document.head.firstChild) {
                    document.head.insertBefore(style, document.head.firstChild);
                } else {
                    document.head.appendChild(style);
                }
            } catch (e) {}
        })();
    </script>
    <!-- Preload 3D model for faster loading -->
    <link rel="preload" href="/static/butterflies.glb" as="fetch" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<!-- 3D Background Canvas for Default Theme -->
<canvas id="bg3d-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; display: none; background: transparent;"></canvas>
<!-- Video Background for Light Theme -->
<video id="light-theme-video" autoplay loop muted playsinline style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; pointer-events: none; display: none;">
    <source src="/static/background.mov" type="video/quicktime">
    <source src="/static/background.mov" type="video/mp4">
</video>
<div id="app" class="screen active">
    <header class="top-bar">
        <span id="layby-user-info" style="color: #1a1a1a !important;"></span>
        <div class="shop-name" style="color: #1a1a1a !important;">{{ store_name }}</div>
        <div class="top-bar-right">
            <button id="btn-back-pos" class="small" style="color: #1a1a1a !important;">Back to POS</button>
            <button id="btn-layby-logout" class="danger small">Logout</button>
        </div>
    </header>
    <main class="pos-layout">
        <!-- Customers View (shown initially) -->
        <section id="customers-view" class="left" style="flex: 1; width: 100%;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <div>
                    <h2 style="margin: 0; display: inline-block; color: #1a1a1a !important;">Layby Customers</h2>
                    <span id="customer-count" style="margin-left: 12px; color: #1a1a1a !important; font-size: 14px;">(0 customers)</span>
                </div>
                <div style="display: flex; gap: 8px;">
                    <button id="btn-view-outstanding-debts" type="button" class="small" style="background: rgba(239, 68, 68, 0.8); color: #1a1a1a !important;" onclick="window.location.href='/debts/outstanding'; return false;">
                        View Outstanding Debts
                    </button>
                    <button id="btn-toggle-customer-form" class="small" style="background: rgba(59, 130, 246, 0.8); color: #1a1a1a !important;">
                        <span id="form-toggle-text" style="color: #1a1a1a !important;">Show Add Customer Form</span>
                    </button>
                </div>
            </div>
            <div id="customer-form-container" class="card" style="max-width:none;margin:8px 0;padding:12px;display:none;">
                <h3 id="customer-form-title" style="margin-top:0;">Add Customer</h3>
                <div class="grid-2">
                    <div>
                        <label for="customer-name">Name *</label>
                        <input type="text" id="customer-name" name="customer_name" placeholder="Customer Name" required>
                    </div>
                    <div>
                        <label for="customer-phone">Phone</label>
                        <input type="text" id="customer-phone" name="customer_phone" placeholder="Phone Number">
                    </div>
                    <div>
                        <label for="customer-email">Email</label>
                        <input type="email" id="customer-email" name="customer_email" placeholder="Email (optional)">
                    </div>
                    <div>
                        <label for="customer-address">Address</label>
                        <input type="text" id="customer-address" name="customer_address" placeholder="Address (optional)">
                    </div>
                    <div style="grid-column: 1 / -1;">
                        <label for="customer-layby-item">Layby Item Name</label>
                        <input type="text" id="customer-layby-item" name="customer_layby_item" placeholder="Name of item customer is paying on layby (optional)">
                    </div>
                </div>
                <div style="margin-top:12px;">
                    <button id="btn-save-customer" class="primary small" type="button">Add Customer</button>
                    <button id="btn-clear-customer" class="small" type="button">Clear</button>
                </div>
                <div id="customer-message" class="info"></div>
            </div>
            <div id="customers-table" style="margin-top:8px;overflow-y:auto;overflow-x:auto;height:calc(100vh - 200px);min-height:400px;background:rgba(17,24,39,0.3);border-radius:8px;padding:8px;">
                <table style="width:100%;border-collapse:collapse;">
                    <thead style="position:sticky;top:0;background:rgba(17,24,39,0.9);z-index:10;">
                        <tr>
                            <th style="text-align:center;padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);color:#1a1a1a !important;font-weight:bold !important;">ID</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);color:#1a1a1a !important;font-weight:bold !important;">Name</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);color:#1a1a1a !important;font-weight:bold !important;">Phone</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);color:#1a1a1a !important;font-weight:bold !important;">Address</th>
                            <th style="text-align:center;padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);color:#1a1a1a !important;font-weight:bold !important;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="customers-body"></tbody>
                </table>
            </div>
        </section>
        
        <!-- Customer History View (shown when customer is selected) -->
        <section id="customer-history-view" style="display: none; width: 100%; padding: 20px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h2 style="margin: 0; display: inline-block;">Customer History</h2>
                    <span id="selected-customer-name" style="margin-left: 12px; color: #1a1a1a; font-size: 16px; font-weight: bold;"></span>
                </div>
                <button id="btn-back-to-customers" class="small" style="background: rgba(59, 130, 246, 0.8);">Back to Customers</button>
            </div>
            <div id="transactions-table" style="overflow:auto;height:calc(100vh - 200px);background:rgba(17,24,39,0.3);border-radius:8px;padding:8px;">
                <table style="width:100%;border-collapse:collapse;">
                    <thead style="position:sticky;top:0;background:rgba(17,24,39,0.9);z-index:10;">
                        <tr>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);">ID</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);">Product</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);">Qty</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);">Total</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);">Paid</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);">Balance</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);">Status</th>
                            <th style="padding:12px;border-bottom:2px solid rgba(255,255,255,0.2);">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="transactions-body"></tbody>
                </table>
            </div>
        </section>
    </main>
</div>

<!-- Payment Panel (floating) -->
<div id="layby-backdrop" class="panel-backdrop" style="display:none;"></div>
<div id="payment-panel" class="floating-panel payment-panel" style="display:none;">
    <div class="floating-panel-header">
        <h2>Record Layby Payment</h2>
        <button id="btn-close-payment" class="close-btn" type="button">×</button>
    </div>
    <div class="totals">
        <div><span>Transaction ID</span><span id="payment-txn-id">-</span></div>
        <div><span>Customer</span><span id="payment-customer">-</span></div>
        <div><span>Product</span><span id="payment-product">-</span></div>
        <div><span>Total Amount</span><span id="payment-total">0.00</span></div>
        <div><span>Paid So Far</span><span id="payment-paid">0.00</span></div>
        <div class="grand"><span>Balance</span><span id="payment-balance">0.00</span></div>
    </div>
    <div class="payments">
        <label for="pay-amount">Payment Amount *</label>
        <input type="number" id="pay-amount" name="pay_amount" step="0.01" min="0.01" required>
        <label for="pay-method">Payment Method *</label>
        <select id="pay-method" name="pay_method" required>
            <option value="cash">Cash</option>
            <option value="mobile_money">Mobile Money</option>
            <option value="card">Card</option>
        </select>
        <label for="pay-notes">Notes</label>
        <textarea id="pay-notes" name="pay_notes" rows="2" placeholder="Notes (optional)"></textarea>
    </div>
    <button id="btn-record-payment" class="primary big" type="button">Record Payment &amp; Print Receipt</button>
    <div id="payment-message" class="info"></div>
</div>

<script src="/static/js/price-input-formatter.js?v=7"></script>
<script src="/static/js/layby.js?v=2"></script>
<!-- Three.js for 3D Background -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/loaders/GLTFLoader.js"></script>
<script src="/static/js/background3d.js?v=5"></script>
</body>
</html>
