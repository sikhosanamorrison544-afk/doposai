<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reset password · {{ store_name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style id="fallback-bg">html,body{min-height:100vh;margin:0;padding:0;background:linear-gradient(135deg,#667eea 0%,#764ba2 25%,#f093fb 50%,#4facfe 75%,#00f2fe 100%);background-size:400% 400%;color:#1a1a2e;}</style>
    <script src="/static/js/theme-instant.js?v=1"></script>
    <link rel="preload" href="/static/butterflies.glb" as="fetch" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/secondary-pages-theme.css?v=1">
    <style>
        .reset-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            box-sizing: border-box;
        }
        .reset-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(14px) saturate(180%);
            -webkit-backdrop-filter: blur(14px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 14px;
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.3);
            padding: 28px 26px;
            color: #ffffff;
        }
        .reset-card h1 {
            font-size: 22px;
            margin: 0 0 6px;
            color: #ffffff;
        }
        .reset-card p.subtitle {
            margin: 0 0 20px;
            color: rgba(255, 255, 255, 0.85);
            font-size: 14px;
            line-height: 1.5;
        }
        .reset-card label {
            display: block;
            margin: 14px 0 6px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.92);
        }
        .reset-card input[type="password"] {
            width: 100%;
            box-sizing: border-box;
            padding: 11px 12px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.94);
            color: #1a1a2e;
            font-size: 15px;
        }
        .reset-card input[type="password"]:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.9);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.25);
        }
        .reset-card .hint {
            margin: 6px 0 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.7);
        }
        .reset-card button.primary-cta {
            width: 100%;
            margin-top: 20px;
            padding: 12px 16px;
            background: #0a0a0a;
            border: 1px solid rgba(0, 0, 0, 0.85);
            color: #ffffff;
            font-weight: 600;
            font-size: 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.15s ease;
        }
        .reset-card button.primary-cta:hover { background: #1a1a1a; }
        .reset-card button.primary-cta:disabled { opacity: 0.55; cursor: not-allowed; }
        .reset-card .message {
            margin-top: 16px;
            font-size: 14px;
            line-height: 1.45;
            min-height: 1.2em;
        }
        .reset-card .message.error { color: #fecaca; }
        .reset-card .message.success { color: #bbf7d0; }
        .reset-card .footer-link {
            margin-top: 18px;
            text-align: center;
            font-size: 13px;
        }
        .reset-card .footer-link a {
            color: rgba(255, 255, 255, 0.95);
            text-decoration: underline;
        }
        /* Light theme: dark card on the lighter wallpaper still reads well */
        html.theme-light .reset-card {
            background: rgba(17, 24, 39, 0.78);
            border-color: rgba(255, 255, 255, 0.18);
        }
        /* Classic theme is already light */
        html.theme-classic .reset-card {
            background: #ffffff;
            color: #1a1a2e;
            border-color: rgba(0, 0, 0, 0.12);
        }
        html.theme-classic .reset-card h1,
        html.theme-classic .reset-card label,
        html.theme-classic .reset-card p.subtitle,
        html.theme-classic .reset-card .hint,
        html.theme-classic .reset-card .footer-link a { color: #1a1a2e; }
    </style>
</head>
<body class="page-reset-password">
<canvas id="bg3d-canvas" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; display: none; background: transparent;"></canvas>
<video id="light-theme-video" autoplay loop muted playsinline preload="auto" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; pointer-events: none; display: none;">
    <source src="/static/background-web.mp4" type="video/mp4">
</video>
<script src="/static/js/light-theme-video.js?v=3"></script>
<div class="reset-page">
    <div class="reset-card">
        <h1>Choose a new password</h1>
        <p class="subtitle" id="reset-subtitle">
            Enter a new password for your <span class="shop-name">{{ store_name }}</span> account.
        </p>

        <form id="reset-form" autocomplete="off" onsubmit="return false;">
            <label for="new-password">New password</label>
            <input type="password" id="new-password" autocomplete="new-password" spellcheck="false" required>

            <label for="confirm-password">Confirm new password</label>
            <input type="password" id="confirm-password" autocomplete="new-password" spellcheck="false" required>

            <p class="hint">Use at least 8 characters with letters and numbers.</p>

            <button type="submit" id="reset-submit" class="primary-cta">Save new password</button>
            <div id="reset-message" class="message" role="status" aria-live="polite"></div>

            <p class="footer-link"><a href="/">Back to sign in</a></p>
        </form>
    </div>
</div>

<script>
    (function () {
        'use strict';

        const params = new URLSearchParams(window.location.search);
        const token = (params.get('token') || '').trim();
        const form = document.getElementById('reset-form');
        const newPw = document.getElementById('new-password');
        const confirmPw = document.getElementById('confirm-password');
        const btn = document.getElementById('reset-submit');
        const msg = document.getElementById('reset-message');

        function setMessage(text, kind) {
            msg.textContent = text || '';
            msg.classList.remove('error', 'success');
            if (kind) msg.classList.add(kind);
        }

        if (!token) {
            setMessage(
                'This reset link is missing the token. Request a new one from the sign-in page.',
                'error'
            );
            btn.disabled = true;
            return;
        }

        function validate() {
            const pw = newPw.value;
            if (pw.length < 8) return 'Password must be at least 8 characters.';
            if (!/[A-Za-z]/.test(pw) || !/\d/.test(pw)) {
                return 'Password must contain both letters and numbers.';
            }
            if (pw !== confirmPw.value) return 'Passwords do not match.';
            return null;
        }

        form.addEventListener('submit', async function () {
            setMessage('');
            const err = validate();
            if (err) { setMessage(err, 'error'); return; }

            btn.disabled = true;
            btn.textContent = 'Saving…';
            try {
                const res = await fetch('/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: token, new_password: newPw.value }),
                });
                if (!res.ok) {
                    let detail = 'That link is invalid or has expired.';
                    try {
                        const data = await res.json();
                        if (data && data.detail) detail = data.detail;
                    } catch (_) { /* noop */ }
                    setMessage(detail, 'error');
                    btn.disabled = false;
                    btn.textContent = 'Save new password';
                    return;
                }
                setMessage(
                    'Password updated. Redirecting to sign in…',
                    'success'
                );
                btn.textContent = 'Done';
                setTimeout(function () { window.location.href = '/'; }, 1500);
            } catch (e) {
                console.error(e);
                setMessage(
                    'Could not reach the server. Check your connection and try again.',
                    'error'
                );
                btn.disabled = false;
                btn.textContent = 'Save new password';
            }
        });

        newPw.focus();
    })();
</script>
<script src="/static/js/theme-sync.js?v=1"></script>
<script src="/static/js/background3d.js?v=5"></script>
<script src="/static/js/store-branding.js?v=1"></script>
</body>
</html>
