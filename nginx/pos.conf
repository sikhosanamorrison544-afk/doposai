# POS System - Nginx Reverse Proxy Configuration
# This file is a template - certbot will modify it after SSL setup

upstream pos_backend {
    server 127.0.0.1:8000;
    keepalive 64;
}

# HTTP server - redirects to HTTPS after SSL setup
server {
    listen 80;
    listen [::]:80;
    server_name doposai.com www.doposai.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Logging
    access_log /var/log/nginx/pos_access.log;
    error_log /var/log/nginx/pos_error.log;

    # Increase client body size for file uploads
    client_max_body_size 10M;

    # For Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Proxy settings
    location / {
        proxy_pass http://pos_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering off;
    }

    # Static files (if served directly by Nginx)
    location /static/ {
        alias /home/morrison/Desktop/pos/static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS server - will be added by certbot
# After SSL setup, certbot will add a server block for port 443
# with SSL configuration and redirect from HTTP to HTTPS

